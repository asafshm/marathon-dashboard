<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Edit training plan</title>
<style>
  body{margin:0;background:#0d1117;color:#e6edf3;
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:16px env(safe-area-inset-right) 40px env(safe-area-inset-left)}
  h1{font-size:18px;margin:0 0 4px}
  p.sub{color:#8b949e;margin:0 0 12px;font-size:13px}
  textarea{width:100%;min-height:58vh;background:#161b22;color:#e6edf3;border:1px solid #283040;
    border-radius:10px;padding:12px;font:13px/1.5 ui-monospace,Menlo,monospace;box-sizing:border-box}
  .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  input,button{font:inherit;padding:11px 13px;border-radius:8px;border:1px solid #283040;background:#161b22;color:#e6edf3}
  input{flex:1;min-width:150px}
  button{background:#238636;border-color:#238636;font-weight:600;cursor:pointer}
  #msg{margin-top:10px;color:#8b949e;font-size:13px}
</style>
</head>
<body>
<h1>✎ Training plan</h1>
<p class="sub">Paste your coach's updated plan here and Save. It feeds the coaching context on the next publish.</p>
<textarea id="plan" placeholder="loading current plan…"></textarea>
<div class="row">
  <input id="pass" type="password" placeholder="passphrase" autocomplete="current-password">
  <button id="save">Save</button>
</div>
<div id="msg"></div>
<script>
const API = "https://marathon-overrides.asafshm.workers.dev";
const $ = id => document.getElementById(id);
const cached = localStorage.getItem("editPass"); if (cached) $("pass").value = cached;
(async () => {
  try { const d = await (await fetch(API + "/plan", {cache:"no-store"})).json(); $("plan").value = d.plan || ""; }
  catch (e) { $("msg").textContent = "Couldn't load the current plan (you can still paste + save)."; }
})();
$("save").onclick = async () => {
  const pass = $("pass").value.trim();
  if (!pass) { $("msg").textContent = "Enter the passphrase."; return; }
  $("msg").textContent = "Saving…";
  try {
    const r = await fetch(API + "/plan", {
      method:"POST", headers:{"Content-Type":"application/json","X-Edit-Pass":pass},
      body: JSON.stringify({ plan: $("plan").value }) });
    if (r.status === 401) { $("msg").textContent = "Wrong passphrase."; return; }
    if (!r.ok) { $("msg").textContent = "Save failed."; return; }
    localStorage.setItem("editPass", pass);
    $("msg").textContent = "Saved ✓ — it appears in the coach feed on the next publish.";
  } catch (e) { $("msg").textContent = "Save failed (network)."; }
};
</script>
</body>
</html>
